<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>EarnedLab — AI Business Operating System for Entrepreneurs</title>
    <meta name="description" content="Discover, validate, launch, market, and manage a business with EarnedLab. The AI business operating system that coordinates planning, marketing, content, tasks, and operations in one connected workspace." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EarnedLab" />
    <meta property="og:title" content="EarnedLab — AI Business Operating System for Entrepreneurs" />
    <meta property="og:description" content="Discover, validate, launch, market, and manage a business with EarnedLab. The AI business operating system that coordinates planning, marketing, content, tasks, and operations in one connected workspace." />
    <meta property="og:url" content="https://earnedlab.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EarnedLab — AI Business Operating System for Entrepreneurs" />
    <meta name="twitter:description" content="Discover, validate, launch, market, and manage a business with EarnedLab. The AI business operating system that coordinates planning, marketing, content, tasks, and operations in one connected workspace." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

    <!-- Prevent iOS auto-zoom on input focus -->
    <style>
      @media (max-width: 640px) {
        input, select, textarea { font-size: 16px !important; }
      }
    </style>

    <!-- Structured data: Organization + WebSite + SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://earnedlab.com/#organization",
          "name": "EarnedLab",
          "url": "https://earnedlab.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://earnedlab.com/favicon.svg"
          },
          "description": "EarnedLab is an AI business operating system for discovering, validating, launching, marketing, and managing a business.",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "support@earnedlab.com",
            "contactType": "customer support"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://earnedlab.com/#website",
          "url": "https://earnedlab.com/",
          "name": "EarnedLab",
          "description": "AI business operating system for entrepreneurs, solo founders, and small-business owners.",
          "publisher": { "@id": "https://earnedlab.com/#organization" }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://earnedlab.com/#software",
          "name": "EarnedLab",
          "url": "https://earnedlab.com/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "An AI business operating system for business idea discovery, validation, market analysis, business planning, marketing strategy, content generation, task management, and ongoing business operations.",
          "publisher": { "@id": "https://earnedlab.com/#organization" },
          "offers": {
            "@type": "AggregateOffer",
            "url": "https://earnedlab.com/pricing",
            "priceCurrency": "USD",
            "lowPrice": "39",
            "highPrice": "199",
            "offerCount": "3"
          },
          "featureList": [
            "AI business idea discovery and matching",
            "Business idea validation and market analysis",
            "AI business planning and launch roadmap",
            "Marketing agent for automated insights and growth",
            "Management agent for autonomous task execution",
            "Content generation for social, email, and web",
            "Business website creation and live deployment",
            "Revenue and lead tracking dashboard",
            "Autopilot mode for fully autonomous business management",
            "Integrations with Instagram, Twitter/X, TikTok, Facebook, LinkedIn, Google Business, WordPress, and email platforms"
          ]
        }
      ]
    }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I start a business with EarnedLab?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Answer a short questionnaire about your skills, available time, and budget. EarnedLab's AI matches you with the best business type for your situation, then automatically builds your website, brand, and initial marketing strategy. Most users are fully launched in under 30 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "I'm a complete beginner — is EarnedLab right for me?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. EarnedLab is designed for people who have never started a business before. You don't need any technical skills, marketing knowledge, or prior experience. The platform guides you step by step and the AI agents handle the complex parts automatically."
          }
        },
        {
          "@type": "Question",
          "name": "What types of side businesses can I start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EarnedLab works best for service-based side businesses: freelancing, consulting, coaching, photography, tutoring, cleaning, handyman services, bookkeeping, and similar local or online service businesses. E-commerce and physical product businesses are not currently supported."
          }
        },
        {
          "@type": "Question",
          "name": "How is EarnedLab different from just asking ChatGPT?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChatGPT gives you advice. EarnedLab actually builds and runs things. It creates your website, deploys it live, tracks your revenue and leads, generates marketing content, and implements changes automatically. It's an active platform, not a conversation."
          }
        },
        {
          "@type": "Question",
          "name": "How much money do I need to start a business with EarnedLab?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can start for $0 in out-of-pocket costs beyond the EarnedLab subscription. EarnedLab builds your website on a free hosting tier. Most service businesses don't require inventory or equipment — just your time and skills."
          }
        },
        {
          "@type": "Question",
          "name": "How long does setup actually take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most users finish the discovery questionnaire in about 5 minutes and have a live business in under 30. EarnedLab handles the research, idea selection, and initial setup automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need any technical skills?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "None at all. EarnedLab handles everything from website creation to deployment. If you can send an email, you can use this."
          }
        },
        {
          "@type": "Question",
          "name": "What happens at the end of the trial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your account moves to a read-only view. Your data and business are saved. Upgrade any time to resume the agents. We'll email you before the trial ends."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel anytime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, with one click from your billing settings. No calls, no forms, no questions. Your subscription ends at the current billing period."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
